name: deploy

# Builds the web image in CI, pushes it to GHCR, then deploys it to the VPS
# over SSH via docker compose. DORMANT by default: the job only runs when the
# repository variable DEPLOY_ENABLED is set to "true", so until the server +
# secrets exist it is skipped (not failed). Also runnable on demand.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    # Enable by setting repo variable DEPLOY_ENABLED=true (Settings → Secrets and variables → Actions → Variables).
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          build-args: |
            GIT_SHA=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/wedevs-web:latest
            ghcr.io/${{ github.repository_owner }}/wedevs-web:${{ github.sha }}

      - name: Copy compose file to the VPS
        # Plain scp — reliable. Only the compose file is needed now; Caddy is
        # configured via its reverse-proxy command (no Caddyfile to sync).
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          scp -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key \
            docker/docker-compose.yml \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_APP_DIR }}/"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_OWNER: ${{ github.repository_owner }}
          APP_DIR: ${{ secrets.VPS_APP_DIR }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_OWNER,APP_DIR
          script: |
            set -e
            cd "$APP_DIR"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_OWNER" --password-stdin
            docker compose pull
            docker compose up -d
            docker logout ghcr.io
            docker image prune -f
